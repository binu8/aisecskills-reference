name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill library (schema + pillar gate)
        run: python3 scripts/validate.py

  vendored-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run vendored msaad00 detection tests
        working-directory: vendor/msaad00-mcp-detection
        run: python3 -m pytest -q --import-mode=importlib
